## หมายเหตุเรื่อง DWG

DWG เป็นรูปแบบ binary proprietary ของ AutoCAD จึงไม่ได้สร้าง native DWG โดยตรงในสภาพแวดล้อมนี้  
ให้เปิดไฟล์ DXF ใน AutoCAD/DraftSight/ODA File Converter แล้ว Save As เป็น DWG

