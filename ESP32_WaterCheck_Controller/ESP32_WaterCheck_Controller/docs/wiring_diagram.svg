<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f7fafc"/>
  <text x="600" y="40" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle">ESP32 Water Check Controller - Wiring Diagram</text>
  <rect x="450" y="120" width="300" height="380" rx="18" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="600" y="155" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">ESP32 DevKit V1</text>
  <text x="470" y="210" font-family="Arial" font-size="18">GPIO34 - Flow IN</text>
  <text x="470" y="250" font-family="Arial" font-size="18">GPIO26 - Relay CH1</text>
  <text x="470" y="290" font-family="Arial" font-size="18">GPIO27 - Relay CH2</text>
  <text x="470" y="330" font-family="Arial" font-size="18">GPIO21 - LCD SDA</text>
  <text x="470" y="370" font-family="Arial" font-size="18">GPIO22 - LCD SCL</text>
  <text x="470" y="410" font-family="Arial" font-size="18">5V / GND</text>
  <rect x="70" y="170" width="250" height="110" rx="14" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
  <text x="195" y="215" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Flow Switch</text>
  <text x="195" y="250" font-family="Arial" font-size="16" text-anchor="middle">Signal to GPIO34</text>
  <rect x="70" y="380" width="250" height="130" rx="14" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
  <text x="195" y="420" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">LCD 16x2 I2C</text>
  <text x="195" y="455" font-family="Arial" font-size="16" text-anchor="middle">SDA=21, SCL=22</text>
  <text x="195" y="480" font-family="Arial" font-size="16" text-anchor="middle">VCC=5V, GND=GND</text>
  <rect x="880" y="190" width="250" height="160" rx="14" fill="#fce4ec" stroke="#ad1457" stroke-width="3"/>
  <text x="1005" y="230" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Relay Module 2CH</text>
  <text x="1005" y="265" font-family="Arial" font-size="16" text-anchor="middle">IN1=GPIO26 Pump</text>
  <text x="1005" y="290" font-family="Arial" font-size="16" text-anchor="middle">IN2=GPIO27 AUX</text>
  <text x="1005" y="315" font-family="Arial" font-size="16" text-anchor="middle">VCC=5V, GND=GND</text>
  <rect x="880" y="430" width="250" height="90" rx="14" fill="#ffebee" stroke="#c62828" stroke-width="3"/>
  <text x="1005" y="465" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">Pump / Contactor</text>
  <text x="1005" y="495" font-family="Arial" font-size="16" text-anchor="middle">Use protection for 220VAC</text>
  <line x1="320" y1="225" x2="450" y2="205" stroke="#ef6c00" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="320" y1="445" x2="450" y2="330" stroke="#2e7d32" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="750" y1="250" x2="880" y2="265" stroke="#ad1457" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1005" y1="350" x2="1005" y2="430" stroke="#c62828" stroke-width="4" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
  <text x="600" y="650" font-family="Arial" font-size="18" text-anchor="middle" fill="#444">Common GND between ESP32, Flow Switch interface, Relay and LCD. 220VAC must be isolated and protected.</text>
</svg>
