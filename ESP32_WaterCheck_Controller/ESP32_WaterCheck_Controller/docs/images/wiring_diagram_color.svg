<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f7fafc"/>
  <text x="700" y="45" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold">ESP32 WaterCheck Controller - Wiring Diagram สี</text>
  <text x="700" y="75" text-anchor="middle" font-family="Arial" font-size="16">ระบบเช็คน้ำขาด by ช่างหนึ่ง</text>

  <rect x="520" y="150" width="360" height="520" rx="20" fill="#1f2937" stroke="#111827" stroke-width="3"/>
  <text x="700" y="185" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#fff">ESP32 DevKit V1</text>

  <g font-family="Arial" font-size="16" fill="#fff">
    <text x="545" y="240">GPIO34 Flow Switch</text>
    <text x="545" y="290">GPIO32 Reset/Unlock</text>
    <text x="545" y="340">GPIO33 E-STOP</text>
    <text x="545" y="390">GPIO26 Relay Pump</text>
    <text x="545" y="440">GPIO27 Relay AUX</text>
    <text x="545" y="490">GPIO21 LCD SDA</text>
    <text x="545" y="540">GPIO22 LCD SCL</text>
    <text x="545" y="590">5V / VIN</text>
    <text x="545" y="640">GND</text>
  </g>

  <rect x="70" y="180" width="300" height="120" rx="15" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="220" y="220" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">Flow Switch</text>
  <text x="220" y="250" text-anchor="middle" font-family="Arial" font-size="16">Signal → GPIO34</text>
  <text x="220" y="275" text-anchor="middle" font-family="Arial" font-size="16">GND ร่วม</text>

  <rect x="70" y="330" width="300" height="120" rx="15" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="220" y="370" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">Local Button</text>
  <text x="220" y="400" text-anchor="middle" font-family="Arial" font-size="16">Reset/Unlock GPIO32</text>
  <text x="220" y="425" text-anchor="middle" font-family="Arial" font-size="16">กดค้าง 10s = Factory Reset</text>

  <rect x="70" y="480" width="300" height="120" rx="15" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="220" y="520" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">E-STOP</text>
  <text x="220" y="550" text-anchor="middle" font-family="Arial" font-size="16">Emergency Stop GPIO33</text>
  <text x="220" y="575" text-anchor="middle" font-family="Arial" font-size="16">แนะนำตัดวงจรกำลังแยก</text>

  <rect x="1030" y="170" width="300" height="150" rx="15" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="1180" y="210" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">Relay Module 2CH</text>
  <text x="1180" y="245" text-anchor="middle" font-family="Arial" font-size="16">IN1 Pump ← GPIO26</text>
  <text x="1180" y="270" text-anchor="middle" font-family="Arial" font-size="16">IN2 AUX ← GPIO27</text>
  <text x="1180" y="295" text-anchor="middle" font-family="Arial" font-size="16">VCC 5V / GND</text>

  <rect x="1030" y="370" width="300" height="130" rx="15" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="1180" y="410" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">LCD 16x2 I2C</text>
  <text x="1180" y="445" text-anchor="middle" font-family="Arial" font-size="16">SDA ← GPIO21</text>
  <text x="1180" y="470" text-anchor="middle" font-family="Arial" font-size="16">SCL ← GPIO22</text>

  <rect x="1030" y="550" width="300" height="120" rx="15" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="1180" y="590" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold">Power Supply</text>
  <text x="1180" y="620" text-anchor="middle" font-family="Arial" font-size="16">5VDC สำหรับ ESP32/Relay</text>
  <text x="1180" y="645" text-anchor="middle" font-family="Arial" font-size="16">Common GND</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>

  <line x1="370" y1="240" x2="520" y2="240" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="370" y1="390" x2="520" y2="290" stroke="#16a34a" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="370" y1="540" x2="520" y2="340" stroke="#dc2626" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="880" y1="390" x2="1030" y2="245" stroke="#d97706" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="880" y1="440" x2="1030" y2="270" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="880" y1="490" x2="1030" y2="445" stroke="#7c3aed" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="880" y1="540" x2="1030" y2="470" stroke="#8b5cf6" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1030" y1="610" x2="880" y2="590" stroke="#0284c7" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1030" y1="645" x2="880" y2="640" stroke="#111827" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="80" y="720" width="1240" height="120" rx="15" fill="#fff" stroke="#cbd5e1"/>
  <text x="105" y="755" font-family="Arial" font-size="18" font-weight="bold">หมายเหตุความปลอดภัย</text>
  <text x="105" y="785" font-family="Arial" font-size="15">1) รีเลย์ที่ควบคุมปั๊ม 220VAC ควรผ่าน Contactor/Breaker/Fuse ตามมาตรฐานไฟฟ้า</text>
  <text x="105" y="810" font-family="Arial" font-size="15">2) E-STOP ควรตัดวงจรกำลังจริง ไม่ควรพึ่ง ESP32 เพียงอย่างเดียว</text>
  <text x="105" y="835" font-family="Arial" font-size="15">3) รวม GND ระหว่าง ESP32, Sensor, Relay Module และ Power Supply</text>
</svg>